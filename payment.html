<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
  />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700&family=Lato:wght@400;500&display=swap"
    rel="stylesheet"
  />

  <style>
    body {
      background-color: #ffffff;
      color: #212529;
      font-family: 'Lato', sans-serif;
    }

    h1, h2, h3, h4, h5, h6,
    .navbar-brand {
      font-family: 'Inter', sans-serif;
    }

    .navbar {
      background-color: #0d6efd !important;
    }

    .navbar .nav-link,
    .navbar .navbar-brand {
      color: #ffffff !important;
      font-weight: 500;
    }

    .navbar .form-control {
      background-color: #ffffff;
      color: #212529;
      border-color: rgba(255, 255, 255, 0.35);
    }

    .navbar .form-control::placeholder {
      color: #6c757d;
      opacity: 1;
    }

    .navbar .form-control:focus {
      color: #212529;
      background-color: #ffffff;
      border-color: #ffffff;
      box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25);
    }

    .navbar .btn-search {
      background-color: #ffffff;
      color: #212529;
      border: 1px solid #ffffff;
      font-weight: 500;
    }

    .navbar .btn-search i,
    .navbar .btn-search span {
      color: #212529;
    }

    .card {
      border: none;
      border-radius: 1rem;
      box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.08);
    }
  </style>
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="index.html"><i class="bi bi-grid me-2"></i>GearHub</a>

      <button
        class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#mainNavbar"
        aria-controls="mainNavbar"
        aria-expanded="false"
        aria-label="Toggle navigation"
      >
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="mainNavbar">
        <form class="d-flex mx-lg-auto my-2 my-lg-0" role="search">
          <input class="form-control me-2" type="search" placeholder="Search products" aria-label="Search products" />
          <button class="btn btn-search" type="submit">
            <i class="bi bi-search me-1"></i><span>Search</span>
          </button>
        </form>

        <ul class="navbar-nav ms-lg-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link" href="index.html"><i class="bi bi-house me-1"></i>Home</a></li>
          <li class="nav-item"><a class="nav-link" href="#"><i class="bi bi-bell me-1"></i>Notifications</a></li>
          <li class="nav-item"><a class="nav-link" href="cart.html"><i class="bi bi-cart3 me-1"></i>Cart</a></li>
          <li class="nav-item"><a class="nav-link" href="#"><i class="bi bi-question-circle me-1"></i>Help</a></li>
          <li class="nav-item"><a class="nav-link" href="login.html"><i class="bi bi-person-circle me-1"></i>Profile</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container my-5">
    <div class="row g-4">
      <div class="col-lg-8">
        <div class="card">
          <div class="card-body">
            <h1 class="h3 mb-4"><i class="bi bi-credit-card me-2"></i>Payment Information</h1>

            <form action="payment-validation.html">
              <div class="row g-3">
                <div class="col-12">
                  <label for="cardName" class="form-label">Name on Card</label>
                  <input type="text" class="form-control" id="cardName" required />
                </div>

                <div class="col-12">
                  <label for="cardNumber" class="form-label">Card Number</label>
                  <input type="text" class="form-control" id="cardNumber" placeholder="1111 2222 3333 4444" required />
                </div>

                <div class="col-md-6">
                  <label for="expDate" class="form-label">Expiration Date</label>
                  <input type="month" class="form-control" id="expDate" required />
                </div>

                <div class="col-md-6">
                  <label for="cvv" class="form-label">CVV</label>
                  <input type="text" class="form-control" id="cvv" placeholder="123" required />
                </div>

                <div class="col-12">
                  <label for="billingAddress" class="form-label">Billing Address</label>
                  <input type="text" class="form-control" id="billingAddress" required />
                </div>

                <div class="col-md-6">
                  <label for="city" class="form-label">City</label>
                  <input type="text" class="form-control" id="city" required />
                </div>

                <div class="col-md-3">
                  <label for="state" class="form-label">State</label>
                  <input type="text" class="form-control" id="state" required />
                </div>

                <div class="col-md-3">
                  <label for="zip" class="form-label">Zip</label>
                  <input type="text" class="form-control" id="zip" required />
                </div>
              </div>

              <div class="form-check mt-4">
                <input class="form-check-input" type="checkbox" value="" id="saveInfo" />
                <label class="form-check-label" for="saveInfo">
                  Save payment information for next time
                </label>
              </div>

              <div class="mt-4 d-grid">
                <button type="submit" class="btn btn-primary">
                  <i class="bi bi-credit-card-2-front me-1"></i>Submit Payment
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>

      <div class="col-lg-4">
        <div class="card">
          <div class="card-body">
            <h2 class="h4 mb-3">Order Summary</h2>

            <div class="d-flex justify-content-between mb-2">
              <span>Items</span>
              <span>$160</span>
            </div>

            <div class="d-flex justify-content-between mb-2">
              <span>Shipping</span>
              <span>$10</span>
            </div>

            <div class="d-flex justify-content-between mb-3">
              <span>Tax</span>
              <span>$12</span>
            </div>

            <hr />

            <div class="d-flex justify-content-between fw-bold">
              <span>Total</span>
              <span>$182</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
