<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login / Sign Up</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
  />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700&family=Lato:wght@400;500&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="index.html"><i class="bi bi-grid me-2"></i>GearHub</a>

      <button
        class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#mainNavbar"
        aria-controls="mainNavbar"
        aria-expanded="false"
        aria-label="Toggle navigation"
      >
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="mainNavbar">
        <form class="d-flex mx-lg-auto my-2 my-lg-0" role="search">
          <input class="form-control me-2" type="search" placeholder="Search products" aria-label="Search products" />
          <button class="btn btn-search" type="submit">
            <i class="bi bi-search me-1"></i><span>Search</span>
          </button>
        </form>

        <ul class="navbar-nav ms-lg-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link" href="index.html"><i class="bi bi-house me-1"></i>Home</a></li>
          <li class="nav-item"><a class="nav-link" href="#"><i class="bi bi-bell me-1"></i>Notifications</a></li>
          <li class="nav-item"><a class="nav-link" href="cart.html"><i class="bi bi-cart3 me-1"></i>Cart</a></li>
          <li class="nav-item"><a class="nav-link" href="#"><i class="bi bi-question-circle me-1"></i>Help</a></li>
          <li class="nav-item"><a class="nav-link active" aria-current="page" href="login.html"><i class="bi bi-person-circle me-1"></i>Profile</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    <div class="row g-4">
      <div class="col-lg-6">
        <div class="card">
          <div class="card-body">
            <h1 class="h3 mb-4"><i class="bi bi-box-arrow-in-right me-2"></i>Login</h1>

            <form action="payment.html">
              <div class="mb-3">
                <label for="loginEmail" class="form-label">Email address</label>
                <input type="email" class="form-control" id="loginEmail" placeholder="name@example.com" required />
              </div>

              <div class="mb-3">
                <label for="loginPassword" class="form-label">Password</label>
                <input type="password" class="form-control" id="loginPassword" required />
              </div>

              <div class="d-grid">
                <button type="submit" class="btn btn-primary">
                  <i class="bi bi-arrow-right-circle me-1"></i>Login and Continue
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>

      <div class="col-lg-6">
        <div class="card">
          <div class="card-body">
            <h2 class="h3 mb-4"><i class="bi bi-person-plus me-2"></i>Sign Up</h2>

            <form action="payment.html">
              <div class="mb-3">
                <label for="signUpName" class="form-label">Full Name</label>
                <input type="text" class="form-control" id="signUpName" required />
              </div>

              <div class="mb-3">
                <label for="signUpEmail" class="form-label">Email address</label>
                <input type="email" class="form-control" id="signUpEmail" placeholder="name@example.com" required />
              </div>

              <div class="mb-3">
                <label for="signUpPassword" class="form-label">Password</label>
                <input type="password" class="form-control" id="signUpPassword" required />
              </div>

              <div class="mb-3">
                <label for="signUpConfirmPassword" class="form-label">Confirm Password</label>
                <input type="password" class="form-control" id="signUpConfirmPassword" required />
              </div>

              <div class="d-grid">
                <button type="submit" class="btn btn-success">
                  <i class="bi bi-check-circle me-1"></i>Create Account and Continue
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer-dark border-top py-4">
    <div class="container text-center">
      <div class="d-flex flex-wrap justify-content-center gap-2">
        <a href="#" class="btn btn-outline-light"><i class="bi bi-question-circle me-1"></i>Help</a>
        <a href="#" class="btn btn-outline-light"><i class="bi bi-envelope me-1"></i>Contact</a>
        <a href="#" class="btn btn-outline-light"><i class="bi bi-info-circle me-1"></i>About</a>
        <a href="#" class="btn btn-outline-light"><i class="bi bi-file-earmark-text me-1"></i>Terms</a>
      </div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
