<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Search & Browse Listings</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
  />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700&family=Lato:wght@400;500&display=swap"
    rel="stylesheet"
  />

  <style>
    :root {
      --primary-color: #0d6efd;
      --secondary-color: #6c757d;
      --background-color: #ffffff;
      --footer-bg: #212529;
      --text-main: #212529;
    }

    body {
      background-color: #f8f9fa;
      color: var(--text-main);
      font-family: 'Lato', sans-serif;
    }

    h1, h2, h3, h4, h5, h6,
    .navbar-brand {
      font-family: 'Inter', sans-serif;
    }

    h1, h2, h3 {
      font-weight: 700;
    }

    h4, h5, h6 {
      font-weight: 600;
    }

    .navbar {
      background-color: var(--primary-color) !important;
    }

    .navbar .nav-link,
    .navbar .navbar-brand {
      color: #ffffff !important;
      font-weight: 500;
    }

    .navbar .form-control {
      background-color: #ffffff;
      color: #212529;
      border-color: rgba(255, 255, 255, 0.35);
    }

    .navbar .form-control::placeholder {
      color: #6c757d;
      opacity: 1;
    }

    .navbar .form-control:focus {
      color: #212529;
      background-color: #ffffff;
      border-color: #ffffff;
      box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25);
    }

    .navbar .btn-search {
      background-color: #ffffff;
      color: #212529;
      border: 1px solid #ffffff;
      font-weight: 500;
    }

    .navbar .btn-search i,
    .navbar .btn-search span {
      color: #212529;
    }

    .navbar .btn-search:hover,
    .navbar .btn-search:focus {
      background-color: #f8f9fa;
      color: #212529;
      border-color: #f8f9fa;
    }

    .product-card {
      transition: transform 0.2s, box-shadow 0.2s;
      height: 100%;
      cursor: pointer;
      border: none;
      border-radius: 1rem;
      box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.08);
    }

    .product-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 0.75rem 1.5rem rgba(0, 0, 0, 0.12);
    }

    .product-image {
      height: 200px;
      object-fit: cover;
      background-color: #e9ecef;
    }

    .filter-sidebar,
    .search-section {
      background-color: white;
      padding: 20px;
      border-radius: 1rem;
      box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.06);
    }

    .filter-label {
      font-weight: 600;
      margin-bottom: 10px;
      color: #333;
      font-family: 'Inter', sans-serif;
    }

    .search-section {
      margin-bottom: 30px;
    }

    .no-results {
      text-align: center;
      padding: 40px 20px;
      color: #666;
    }
  </style>
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="index.html"><i class="bi bi-grid me-2"></i>GearHub</a>
      <button
        class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#mainNavbar"
        aria-controls="mainNavbar"
        aria-expanded="false"
        aria-label="Toggle navigation"
      >
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNavbar">
        <form class="d-flex mx-lg-auto my-2 my-lg-0" role="search">
          <input class="form-control me-2" type="search" placeholder="Search products" aria-label="Search products" />
          <button class="btn btn-search" type="submit">
            <i class="bi bi-search me-1"></i><span>Search</span>
          </button>
        </form>
        <ul class="navbar-nav ms-lg-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link" href="index.html"><i class="bi bi-house me-1"></i>Home</a></li>
          <li class="nav-item"><a class="nav-link" href="#"><i class="bi bi-bell me-1"></i>Notifications</a></li>
          <li class="nav-item"><a class="nav-link" href="cart.html"><i class="bi bi-cart3 me-1"></i>Cart</a></li>
          <li class="nav-item"><a class="nav-link" href="#"><i class="bi bi-question-circle me-1"></i>Help</a></li>
          <li class="nav-item"><a class="nav-link" href="login.html"><i class="bi bi-person-circle me-1"></i>Profile</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container-fluid py-4">
    <div class="search-section">
      <div class="row g-2">
        <div class="col-12 col-lg-8">
          <input
            type="search"
            class="form-control form-control-lg"
            id="searchInput"
            placeholder="Search products..."
            aria-label="Search products"
          />
        </div>
        <div class="col-12 col-lg-4">
          <button class="btn btn-primary btn-lg w-100" id="searchBtn" type="button">
            <i class="bi bi-search me-1"></i>Search
          </button>
        </div>
      </div>
    </div>

    <div class="row g-4">
      <div class="col-12 col-lg-3">
        <div class="d-lg-none mb-3">
          <button
            class="btn btn-outline-primary w-100"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#filterCollapse"
            aria-expanded="false"
            aria-controls="filterCollapse"
          >
            <i class="bi bi-funnel me-1"></i>Show Filters
          </button>
        </div>

        <div id="filterCollapse" class="collapse d-lg-block">
          <div class="filter-sidebar">
            <h5 class="mb-3">Filters</h5>

            <div class="mb-4">
              <p class="filter-label">Category</p>
              <div class="form-check">
                <input class="form-check-input category-filter" type="checkbox" value="electronics" id="cat-electronics" />
                <label class="form-check-label" for="cat-electronics">Electronics</label>
              </div>
              <div class="form-check">
                <input class="form-check-input category-filter" type="checkbox" value="books" id="cat-books" />
                <label class="form-check-label" for="cat-books">Books</label>
              </div>
              <div class="form-check">
                <input class="form-check-input category-filter" type="checkbox" value="clothing" id="cat-clothing" />
                <label class="form-check-label" for="cat-clothing">Clothing</label>
              </div>
              <div class="form-check">
                <input class="form-check-input category-filter" type="checkbox" value="home" id="cat-home" />
                <label class="form-check-label" for="cat-home">Home & Garden</label>
              </div>
            </div>

            <div class="mb-4">
              <p class="filter-label">Price Range</p>
              <div class="form-check">
                <input class="form-check-input price-filter" type="radio" name="priceRange" value="all" id="price-all" checked />
                <label class="form-check-label" for="price-all">All Prices</label>
              </div>
              <div class="form-check">
                <input class="form-check-input price-filter" type="radio" name="priceRange" value="0-50" id="price-50" />
                <label class="form-check-label" for="price-50">$0 - $50</label>
              </div>
              <div class="form-check">
                <input class="form-check-input price-filter" type="radio" name="priceRange" value="50-100" id="price-100" />
                <label class="form-check-label" for="price-100">$50 - $100</label>
              </div>
              <div class="form-check">
                <input class="form-check-input price-filter" type="radio" name="priceRange" value="100+" id="price-plus" />
                <label class="form-check-label" for="price-plus">$100+</label>
              </div>
            </div>

            <button class="btn btn-outline-secondary w-100" id="clearFiltersBtn" type="button">
              <i class="bi bi-arrow-counterclockwise me-1"></i>Clear All Filters
            </button>
          </div>
        </div>
      </div>

      <div class="col-12 col-lg-9">
        <div class="row g-3" id="productGrid"></div>

        <div id="noResults" class="no-results" style="display: none;">
          <h5>No products found</h5>
          <p>Try adjusting your filters or search terms.</p>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    const products = [
      { id: 1, title: "Wireless Headphones", category: "electronics", price: 79.99, image: "https://via.placeholder.com/300x200?text=Wireless+Headphones", rating: 4.5 },
      { id: 2, title: "Programming in Python", category: "books", price: 29.99, image: "https://via.placeholder.com/300x200?text=Python+Book", rating: 4.8 },
      { id: 3, title: "Cotton T-Shirt", category: "clothing", price: 19.99, image: "https://via.placeholder.com/300x200?text=T-Shirt", rating: 4.2 },
      { id: 4, title: "Desk Lamp", category: "home", price: 45.99, image: "https://via.placeholder.com/300x200?text=Desk+Lamp", rating: 4.6 },
      { id: 5, title: "Smart Watch", category: "electronics", price: 199.99, image: "https://via.placeholder.com/300x200?text=Smart+Watch", rating: 4.7 },
      { id: 6, title: "Web Design Essentials", category: "books", price: 34.99, image: "https://via.placeholder.com/300x200?text=Web+Design+Book", rating: 4.4 },
      { id: 7, title: "Denim Jeans", category: "clothing", price: 59.99, image: "https://via.placeholder.com/300x200?text=Jeans", rating: 4.3 },
      { id: 8, title: "Plant Pot Set", category: "home", price: 24.99, image: "https://via.placeholder.com/300x200?text=Plant+Pots", rating: 4.1 },
      { id: 9, title: "USB-C Cable", category: "electronics", price: 12.99, image: "https://via.placeholder.com/300x200?text=USB+Cable", rating: 4.5 }
    ];

    function renderProducts(filteredProducts) {
      const productGrid = document.getElementById("productGrid");
      const noResults = document.getElementById("noResults");

      productGrid.innerHTML = "";

      if (filteredProducts.length === 0) {
        noResults.style.display = "block";
        return;
      }

      noResults.style.display = "none";

      filteredProducts.forEach((product) => {
        const productCol = document.createElement("div");
        productCol.className = "col-12 col-md-6 col-lg-4";

        productCol.innerHTML = `
          <div class="card product-card" onclick="window.location.href='products.html'">
            <img src="${product.image}" class="card-img-top product-image" alt="${product.title}">
            <div class="card-body">
              <h5 class="card-title">${product.title}</h5>
              <p class="card-text text-muted">
                <small>${product.category.charAt(0).toUpperCase() + product.category.slice(1)}</small>
              </p>
              <div class="d-flex justify-content-between align-items-center mb-2">
                <span class="h5 mb-0">$${product.price.toFixed(2)}</span>
                <small class="text-warning">★ ${product.rating}</small>
              </div>
              <button class="btn btn-primary btn-sm w-100" onclick="event.stopPropagation()">
                <i class="bi bi-cart-plus me-1"></i>Add to Cart
              </button>
            </div>
          </div>
        `;

        productGrid.appendChild(productCol);
      });
    }

    function applyFilters() {
      const selectedCategories = Array.from(
        document.querySelectorAll(".category-filter:checked")
      ).map((el) => el.value);

      const selectedPrice = document.querySelector(
        "input[name='priceRange']:checked"
      ).value;

      const searchTerm = document
        .getElementById("searchInput")
        .value.toLowerCase();

      const filteredProducts = products.filter((product) => {
        const categoryMatch =
          selectedCategories.length === 0 ||
          selectedCategories.includes(product.category);

        let priceMatch = true;
        if (selectedPrice === "0-50") {
          priceMatch = product.price <= 50;
        } else if (selectedPrice === "50-100") {
          priceMatch = product.price > 50 && product.price <= 100;
        } else if (selectedPrice === "100+") {
          priceMatch = product.price > 100;
        }

        const searchMatch =
          product.title.toLowerCase().includes(searchTerm) ||
          product.category.toLowerCase().includes(searchTerm);

        return categoryMatch && priceMatch && searchMatch;
      });

      renderProducts(filteredProducts);
    }

    document.querySelectorAll(".category-filter").forEach((el) => el.addEventListener("change", applyFilters));
    document.querySelectorAll(".price-filter").forEach((el) => el.addEventListener("change", applyFilters));
    document.getElementById("searchBtn").addEventListener("click", applyFilters);
    document.getElementById("searchInput").addEventListener("keyup", applyFilters);

    document.getElementById("clearFiltersBtn").addEventListener("click", () => {
      document.querySelectorAll(".category-filter").forEach((el) => (el.checked = false));
      document.getElementById("price-all").checked = true;
      document.getElementById("searchInput").value = "";
      applyFilters();
    });

    renderProducts(products);
  </script>
</body>
</html>
